<!doctype html>
<html lang="en-UK">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Python Concurrency Quiz</title>
    <meta name="author" content="Cosmo Grant" />
    <meta
      name="description"
      content="Check your knowledge of Python fundamentals with these interactive quizzes."
    />
    <link rel="stylesheet" href="questions-vars.css" />
    <link rel="stylesheet" href="styles.css" />
  </head>

  <body>
    <div id="splash-screen">
      <h1>Python by quiz</h1>
      <p class="muted">
        Code tested in Python 3.14 with the GIL using
        <a href="https://github.com/cosmo-grant/snippet-checker"
          >snippet-checker</a
        >.
      </p>
      <div id="quiz-choices"></div>
      <footer>
        made by
        <a href="https://github.com/cosmo-grant">cosmo grant</a> &centerdot;
        inspired by <a href="https://fstrings.wtf/">fstrings.wtf</a> &centerdot;
        styled by claude &centerdot;
        <a href="https://github.com/cosmo-grant/python-concurrency-quiz"
          >source</a
        >
      </footer>
    </div>

    <div id="nav-bar"></div>

    <div id="main-content">
      <div id="preface-text"></div>
      <div id="code-row">
        <pre><code id="code-display" class="lang-python"></code></pre>
      </div>

      <div id="answers-row">
        <button id="answer-0">
          <div class="answer-content">
            <pre><samp id="answer-0-text"></samp></pre>
          </div>
        </button>
        <button id="answer-1">
          <div class="answer-content">
            <pre><samp id="answer-1-text"></samp></pre>
          </div>
        </button>
        <button id="answer-2">
          <div class="answer-content">
            <pre><samp id="answer-2-text"></samp></pre>
          </div>
        </button>
      </div>

      <div id="explanation-section">
        <div id="explanation-text"></div>
      </div>

      <div id="nav-buttons">
        <button id="next-button">&gt;</button>
        <button id="finish-button">&gt;&gt;</button>
      </div>
    </div>

    <div id="final-score-section">
      <p>
        <span id="final-score-value"></span>/<span id="final-score-max"></span>
      </p>
      <p id="final-score-message"></p>
      <p class="anki-plug">
        Want more? You might like
        <a href="https://ankiweb.net/shared/info/1924308445">my anki deck</a>.
      </p>
      <button id="restart-button">Restart</button>
    </div>

    <div id="continue-dialog">
      <div>
        <div>
          <h3>Continue quiz?</h3>
        </div>
        <div>
          <p>
            <span id="saved-title-dialog"></span>
            (on <span id="saved-question-dialog"></span> of
            <span id="total-questions-dialog"></span>)
          </p>
          <div>
            <button id="continue-from-saved-button">Continue</button>
            <button id="restart-from-saved-button">Restart</button>
          </div>
        </div>
      </div>
    </div>
    <link rel="stylesheet" href="hljs-theme.css" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <script src="questions_per_quiz.js"></script>
    <script src="quiz.js"></script>
  </body>
</html>
